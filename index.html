<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Fighter: Brazil Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Overlay UI -->
        <div id="ui-overlay">
            <div class="health-section player-1">
                <div class="health-bar-container">
                    <div id="p1-health" class="health-bar"></div>
                </div>
                <div class="special-bar-container">
                    <div id="p1-special" class="special-bar"></div>
                </div>
                <div class="rounds-container" id="p1-rounds">
                    <div class="round-gem"></div>
                    <div class="round-gem"></div>
                </div>
                <div class="character-name">CANARINHO</div>
            </div>
            
            <div id="timer-container">
                <div id="timer">99</div>
            </div>
            
            <div class="health-section player-2">
                <div class="health-bar-container">
                    <div id="p2-health" class="health-bar"></div>
                </div>
                <div class="special-bar-container">
                    <div id="p2-special" class="special-bar"></div>
                </div>
                <div class="rounds-container" id="p2-rounds">
                    <div class="round-gem"></div>
                    <div class="round-gem"></div>
                </div>
                <div class="character-name">CAPIVARA</div>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="status-display"></div>
        
        <div id="start-screen">
            <h1 class="glitter-text">MEME FIGHTER</h1>
            <h2>BRAZIL EDITION</h2>
            <p class="blink">Pressione ESPAÇO para Iniciar</p>
        </div>

        <div id="selection-screen" style="display: none;">
            <h2 id="selection-title">SELECIONE SEU LUTADOR (P1)</h2>
            <div class="character-grid">
                <div class="char-card active" data-char="CANARINHO">
                    <img src="./assets/characters/canarinho.png" alt="Canarinho">
                    <span>CANARINHO</span>
                </div>
                <div class="char-card" data-char="CAPIVARA">
                    <img src="./assets/characters/capivara.png" alt="Capivara">
                    <span>CAPIVARA</span>
                </div>
                <div class="char-card" data-char="GALO">
                    <img src="./assets/characters/galo.png" alt="Galo Cego">
                    <span>GALO CEGO</span>
                </div>
                <div class="char-card" data-char="NEGOBAM">
                    <img src="./assets/characters/negobam.png" alt="Nego Bam">
                    <span>NECO BAM</span>
                </div>
            </div>
            <div class="selection-controls">Use as setas para mover | ESPAÇO para confirmar</div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>
    <script src="main.js"></script>
</body>
</html>
